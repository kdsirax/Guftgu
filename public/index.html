<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
        }

        .chat-body {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .users-panel {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            min-height: 60px;
        }

        .users-title {
            font-weight: bold;
            color: #495057;
            margin-bottom: 10px;
        }

        .users-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .user-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message:not(.own) .message-content {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }

        .message-username {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-text {
            word-wrap: break-word;
        }

        .message-time {
            font-size: 0.7em;
            opacity: 0.7;
            margin-top: 4px;
        }

        .typing-indicator {
            padding: 10px 20px;
            font-style: italic;
            color: #6c757d;
            font-size: 0.9em;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            outline: none;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .send-button:hover {
            transform: scale(1.05);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .username-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .username-form {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .username-form h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .username-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 20px;
            outline: none;
        }

        .username-input:focus {
            border-color: #667eea;
        }

        .join-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }

        .join-button:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        .notification {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.9em;
        }

        .notification.user-left {
            background: #dc3545;
        }

        @media (max-width: 600px) {
            .chat-container {
                width: 95%;
                height: 95vh;
                border-radius: 10px;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Username Modal -->
    <div id="usernameModal" class="username-modal">
        <div class="username-form">
            <h2>Welcome to Chat App</h2>
            <input type="text" id="usernameInput" class="username-input" placeholder="Enter your username" maxlength="20">
            <button id="joinButton" class="join-button">Join Chat</button>
        </div>
    </div>

    <!-- Chat Container -->
    <div id="chatContainer" class="chat-container hidden">
        <div class="chat-header">
            💬 Modern Chat App
        </div>
        
        <div class="chat-body">
            <div class="users-panel">
                <div class="users-title">👥 Online Users (<span id="userCount">0</span>)</div>
                <div id="usersList" class="users-list"></div>
            </div>
            
            <div id="messagesContainer" class="messages-container">
                <!-- Messages will be added here -->
            </div>
            
            <div id="typingIndicator" class="typing-indicator hidden"></div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" class="chat-input" placeholder="Type your message..." disabled>
                <button id="sendButton" class="send-button" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUsername = '';
        let typingTimer;

        // DOM elements
        const usernameModal = document.getElementById('usernameModal');
        const chatContainer = document.getElementById('chatContainer');
        const usernameInput = document.getElementById('usernameInput');
        const joinButton = document.getElementById('joinButton');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const messagesContainer = document.getElementById('messagesContainer');
        const usersList = document.getElementById('usersList');
        const userCount = document.getElementById('userCount');
        const typingIndicator = document.getElementById('typingIndicator');

        // Join chat functionality
        joinButton.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username) {
                currentUsername = username;
                socket.emit('user-join', username);
                usernameModal.classList.add('hidden');
                chatContainer.classList.remove('hidden');
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinButton.click();
            }
        });

        // Send message functionality
        sendButton.addEventListener('click', () => {
            sendMessage();
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                socket.emit('new-message', { message });
                messageInput.value = '';
                socket.emit('typing', { isTyping: false });
            }
        }

        // Typing indicator
        messageInput.addEventListener('input', () => {
            socket.emit('typing', { isTyping: true });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                socket.emit('typing', { isTyping: false });
            }, 1000);
        });

        // Socket event listeners
        socket.on('message', (data) => {
            addMessage(data);
        });

        socket.on('user-joined', (username) => {
            addNotification(`${username} joined the chat`);
        });

        socket.on('user-left', (username) => {
            addNotification(`${username} left the chat`, 'user-left');
        });

        socket.on('users-list', (users) => {
            updateUsersList(users);
        });

        socket.on('user-typing', (data) => {
            if (data.isTyping) {
                typingIndicator.textContent = `${data.username} is typing...`;
                typingIndicator.classList.remove('hidden');
            } else {
                typingIndicator.classList.add('hidden');
            }
        });

        // Helper functions
        function addMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.username === currentUsername ? 'own' : ''}`;
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-username">${data.username}</div>
                    <div class="message-text">${escapeHtml(data.message)}</div>
                    <div class="message-time">${data.timestamp}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addNotification(text, type = '') {
            const notificationDiv = document.createElement('div');
            notificationDiv.className = `notification ${type}`;
            notificationDiv.textContent = text;
            messagesContainer.appendChild(notificationDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            setTimeout(() => {
                notificationDiv.remove();
            }, 3000);
        }

        function updateUsersList(users) {
            usersList.innerHTML = '';
            userCount.textContent = users.length;
            
            users.forEach(user => {
                const userBadge = document.createElement('div');
                userBadge.className = 'user-badge';
                userBadge.textContent = user;
                usersList.appendChild(userBadge);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Focus username input on load
        usernameInput.focus();
    </script>
</body>
</html>
